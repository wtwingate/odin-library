<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Library</title>
    <link rel="stylesheet" href="styles/global.css" />
    <script src="scripts/library.js" defer></script>
  </head>
  <body>
    <main>
      <h1>Your Library</h1>
      <dialog id="add-book-dialog">
        <form id="add-book-form">
          <label for="book-title">Title</label>
          <input
            type="text"
            id="book-title"
            name="book-title"
            required
            autofocus
          />
          <label for="book-author">Author</label>
          <input type="text" id="book-author" name="book-author" required />
          <label for="book-genre">Genre</label>
          <input type="text" id="book-genre" name="book-genre" required />
          <label for="book-read">Read?</label>
          <input type="checkbox" name="book-read" id="book-read" />
          <button id="submit-button" value="default" formmethod="dialog">
            Submit
          </button>
          <button
            id="cancel-button"
            value="cancel"
            formmethod="dialog"
            formnovalidate
          >
            Cancel
          </button>
        </form>
      </dialog>
      <button id="add-book-button">Add Book</button>
      <div id="book-list"></div>
    </main>
  </body>
</html>
